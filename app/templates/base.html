<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LibraryMS{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1815;
      --surface2: #232018;
      --accent: #c9a84c;
      --accent2: #e8c97a;
      --text: #ede8df;
      --muted: #7a7268;
      --danger: #c0392b;
      --success: #27ae60;
      --info: #2980b9;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--surface);
      border-right: 1px solid #2a2620; display: flex; flex-direction: column;
      padding: 28px 0; position: fixed; top: 0; left: 0; height: 100vh;
    }
    .sidebar-brand {
      padding: 0 24px 28px; border-bottom: 1px solid #2a2620;
    }
    .sidebar-brand h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--accent); letter-spacing: .5px; }
    .sidebar-brand p { font-size: .72rem; color: var(--muted); margin-top: 3px; letter-spacing: 1.5px; text-transform: uppercase; }
    .nav { flex: 1; padding: 20px 0; }
    .nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px; color: var(--muted); text-decoration: none;
      font-size: .88rem; font-weight: 500; transition: all .2s;
      border-left: 3px solid transparent;
    }
    .nav a:hover, .nav a.active {
      color: var(--accent); background: rgba(201,168,76,.07);
      border-left-color: var(--accent);
    }
    .nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    /* Main */
    .main { margin-left: 240px; flex: 1; padding: 36px 40px; }
    .page-header { margin-bottom: 32px; }
    .page-header h2 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--text); }
    .page-header p { color: var(--muted); font-size: .9rem; margin-top: 6px; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid #2a2620;
      border-radius: var(--radius); padding: 24px;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid #2a2620;
      border-radius: var(--radius); padding: 22px 24px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent);
    }
    .stat-card .label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent2); margin-top: 8px; }
    .stat-card .icon-bg { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 2.8rem; opacity: .07; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; padding: 12px 16px; background: var(--surface2); color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    td { padding: 13px 16px; border-bottom: 1px solid #231f1a; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* Badge */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
    .badge-success { background: rgba(39,174,96,.15); color: #2ecc71; }
    .badge-danger  { background: rgba(192,57,43,.15);  color: #e74c3c; }
    .badge-info    { background: rgba(41,128,185,.15);  color: #3498db; }
    .badge-warn    { background: rgba(241,196,15,.15);  color: #f1c40f; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #0f0e0c; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-danger  { background: rgba(192,57,43,.2); color: #e74c3c; }
    .btn-danger:hover { background: rgba(192,57,43,.35); }
    .btn-sm { padding: 5px 12px; font-size: .78rem; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: .78rem; color: var(--muted); font-weight: 500; letter-spacing: .5px; }
    input, select {
      background: var(--surface2); border: 1px solid #2e2922;
      border-radius: 7px; padding: 10px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .875rem;
      outline: none; transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid #2e2922;
      border-radius: 14px; padding: 32px; width: 100%; max-width: 540px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 22px; color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

    /* Alerts */
    .alert { padding: 12px 18px; border-radius: 7px; margin-bottom: 20px; font-size: .875rem; font-weight: 500; }
    .alert-success { background: rgba(39,174,96,.12); color: #2ecc71; border: 1px solid rgba(39,174,96,.2); }
    .alert-danger  { background: rgba(192,57,43,.12);  color: #e74c3c; border: 1px solid rgba(192,57,43,.2); }
    .alert-info    { background: rgba(41,128,185,.12);  color: #3498db; border: 1px solid rgba(41,128,185,.2); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>📚 LibraryMS</h1>
    <p>Management System</p>
  </div>
  <nav class="nav">
    <a href="/" class="{% if request.endpoint == 'main.index' %}active{% endif %}">
      <span class="icon">🏠</span> Dashboard
    </a>
    <a href="/books" class="{% if request.endpoint == 'main.books' %}active{% endif %}">
      <span class="icon">📖</span> Books
    </a>
    <a href="/members" class="{% if request.endpoint == 'main.members' %}active{% endif %}">
      <span class="icon">👥</span> Members
    </a>
    <a href="/issues" class="{% if request.endpoint == 'main.issues' %}active{% endif %}">
      <span class="icon">🔄</span> Issue / Return
    </a>
  </nav>
</aside>
<main class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script>
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
